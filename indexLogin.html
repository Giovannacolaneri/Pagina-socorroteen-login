<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socorro Teen - Entrar</title>
  <link rel="stylesheet" href="styleLogin.css" />
</head>

<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-logo">
        <img src="img/logo.png" alt="logo">
        <span class="logo-text">Socorro Teen</span>
      </a>

      <ul class="navbar-links">
        <li><a href="/" class="nav-link">Inicio</a></li>
        <li><a href="/primeiros-socorros" class="nav-link">Primeiros Socorros</a></li>
        <li><a href="/socorro-ia" class="nav-link">Socorro IA</a></li>
        <li><a href="/simulador" class="nav-link">Simulador</a></li>
        <li><a href="/sobre" class="nav-link">Sobre</a></li>
      </ul>

      <a href="#" class="btn-login">Entrar</a>

      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="login-page">
    <div class="login-container">
      <div class="login-logo">
        <img src="img/logo.png" alt="logo">
      </div>

      <h1 class="login-title">Entrar</h1>
      <p class="login-subtitle">Acesse sua conta</p>

      <div class="login-card">
        <form id="loginForm">
          <button type="button" class="btn-social btn-google" id="googleLoginBtn">
            <span class="social-icon" aria-hidden="true">G</span>
            <span>Continuar com Google</span>
          </button>

          <button type="button" class="btn-social btn-apple" id="appleLoginBtn">
            <span class="social-icon" aria-hidden="true">A</span>
            <span>Continuar com Apple</span>
          </button>

          <div class="divider">ou entre com e-mail</div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" type="email" class="form-input">
            <span id="emailError" class="error-msg"></span>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input id="password" type="password" class="form-input">
            <span id="passwordError" class="error-msg"></span>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">
            <span id="btnContent">Entrar</span>
            <span id="btnLoading" style="display:none;">Carregando...</span>
          </button>

          <button type="button" class="btn-register" id="toggleRecuperacaoBtn">Recuperar Senha</button>

          <div class="recovery-panel hidden" id="recoveryPanel">
            <div class="form-group">
              <label for="emailRecuperacao">E-mail para recuperacao</label>
              <input type="email" id="emailRecuperacao" class="form-input" placeholder="Seu e-mail">
            </div>

            <button type="button" class="btn-register" id="btnRecuperar">Enviar link de recuperacao</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="scriptLogin.js"></script>
</body>
</html>
